server:
  port: 8081

spring:
  application:
    name: yawn-agent
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/yawn}
    username: ${DB_USER:yawn}
    password: ${DB_PASS:password}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

logging:
  level:
    rip.yawn.agent: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
